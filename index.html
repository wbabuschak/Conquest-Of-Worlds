    <script>
        const worldMusic = {
            2: "music/Live-Today.wav",
            3: "music/Wasted-Time.wav",
            4: "music/Thinking-Of-You.wav",
            1: "music/Overdose.wav",
            5: "music/Overture.wav",
        }
        
        let activeEntity;
        let inventory = new Inventory;
        let equipped = [];
        let autoMode = false;
        let autoInterval;
        let attackCount = 0;
        let enemyAttacks = 0;
        let lastHits = [];
        let kills = 0;
        let dropCount = 1;
        let dropBonus = 0.0;
        let music = false;
        let volume;
        let dev = false;

        let precomputedDamage = {
            baseDmg: [new DamagePair("Physical",1)],
            dmgMult: 1.0,
            moreMult: 1.0,
            missChance: 0.0,
            missMult: 0.0,
            arcaneCount: 0,
            arcaneSetBonus: 0,
            starSetBonus: 0,
            necroSetBonus: 0,
            setBase: -1
        };

        let experience = 0;
        let level = 0;

        function gainExperience(entity){
            let xp_to_level = 1 * (4 + level) * (4 + level) * (4 + level);
            if (entity){
                let exp = entity.xp;
                if (entity.mobLevel >= level){
                    experience += exp;
                    // document.getElementById("xpText").style.color = "";
                } else {
                    // document.getElementById("xpText").style.color = "#c5c5c5ff";
                }
                
                
                while (experience >= xp_to_level){
                    experience -= xp_to_level;
                    level++;
                    
                    xp_to_level = 1 * (4 + level) * (4 + level) * (4 + level);
                }
            }
            
            document.getElementById("xpBar").style.width = (100 * experience / xp_to_level) + '%';
            document.getElementById("xpText").innerHTML =`Level: ${level}<br>XP: ${toShort(experience) } / ${toShort(xp_to_level)}`;
        }

        gainExperience();

        function gainReputation(entity) {
            if (!entity) return;
            if (entity.gainReps){
                entity.gainReps.forEach(name => {
                    reps.get(name)?.gainRep();
                });
            }
            if (entity.loseReps){
                entity.loseReps.forEach(name => {
                    reps.get(name)?.loseRep();
                });
            }
            
        }

        function updateInventory(){
            const inventoryElement = document.getElementById("inventory");
            if (inventory.items.length == 0) {
                inventoryElement.textContent = "Inventory is empty.";
            } else {
                inventoryElement.replaceChildren(inventory.list());
            }
            updateRecipesDisplays();
            updateEquipSelect();
            updateUnequipSelect();
            updateWorldSelect();
            saveGame();
        }
        function updateEquipped(){
            const equippedElement = document.getElementById("equippedItems");
            if (!equipped.length) {
                equippedElement.textContent = "No items equipped.";
            } else {
                equippedElement.innerHTML = "";
                equipped.sort((a,b) => orderedSlots.indexOf(a.equippable) - orderedSlots.indexOf(b.equippable));
                equipped.forEach(item => {
                    
                    const wrapper = document.createElement("span");
                    const type = item.equippable;
                    const color = item.color;

                    const img = document.createElement("img");
                    img.src = 'icons/' + type + '.png';
                    img.width = 32;
                    img.height = 32;
                    img.style.verticalAlign = 'middle';
                    img.style.imageRendering = 'pixelated';
                    
                    // color filter
                    switch(color){
                        case "#2b814fff":
                            img.style.filter = 'brightness(100%) invert(42%) sepia(20%) saturate(1173%) hue-rotate(92deg) brightness(94%) contrast(93%)';
                            break;
                        case "#17467cff":
                            img.style.filter = 'brightness(100%) invert(19%) sepia(69%) saturate(1395%) hue-rotate(188deg) brightness(98%) contrast(90%)';
                            break;
                        case "#9a50c5ff":
                            img.style.filter = 'brightness(100%) invert(59%) sepia(99%) saturate(4322%) hue-rotate(246deg) brightness(81%) contrast(88%)';
                            break;
                        case "#aa2a0aff":
                            img.style.filter = 'brightness(100%) invert(19%) sepia(22%) saturate(7489%) hue-rotate(356deg) brightness(102%) contrast(98%)';
                            break;
                        case "#53404fff":
                            img.style.filter = 'brightness(100%) invert(22%) sepia(19%) saturate(616%) hue-rotate(261deg) brightness(97%) contrast(83%);';
                            break;
                        case "#723e67ff":
                            img.style.filter = 'brightness(100%) invert(26%) sepia(48%) saturate(554%) hue-rotate(261deg) brightness(96%) contrast(88%);';
                            break;
                    }
                    


                    wrapper.appendChild(img);

                    // const typeSpan = document.createElement("span");
                    // typeSpan.textContent = type + "- ";
                    // typeSpan.style.color = "";
                    
                    // wrapper.appendChild(typeSpan);

                    const temp = { items: [item], list: Inventory.prototype.list };
                    const itemFragment = temp.list.call({ items: [item], }, false);
                    wrapper.appendChild(itemFragment);

                    equippedElement.appendChild(wrapper);
                    equippedElement.appendChild(document.createElement("br"));
                });
            }
            
            lastHits = [];
            updateDPSDisplay();
        }

        function updateRecipesDisplays(){
            const craftDisplay = document.getElementById("craftDisplay");
            const recipeDisplay = document.getElementById("recipeDisplay");
            craftDisplay.innerHTML = "";
            recipeDisplay.innerHTML = "";
            const craftableRecipesWithIndex = recipes
                .map((recipe, idx) => [recipe, idx]).filter(([recipe]) => 
                recipe.materials.every(material => {
                    const item = inventory.items.find(i => i.name == material.name);
                    //console.log("1. " + material.name + " found in " + recipe.output + ": " + item);
                    return item && item.quantity >= material.quantity;
                }));
            const learnedRecipesWithIndex = recipes
                .map((recipe, idx) => [recipe, idx]).filter(([recipe]) => 
                recipe.materials.every(material => {
                    const item = inventory.knownItems.has(material.name);
                    //console.log("2. " + material.name + " found in " + recipe.output + ": " + item);
                    return item;
                }));

            craftDisplay.innerHTML +=
                craftableRecipesWithIndex
                .map(([item, originalIndex]) =>
                    `Craft: <span style="color: ${item.output.color}; cursor: pointer;"
                    onmousedown="inventory.craftItem(recipes[${originalIndex}]); updateRecipesDisplays(); updateInventory();">
                    ${item.output.name}</span> ` +
                    `<em>(${item.materials.join(", ")})</em>`
                )
                .join("<br>");
            recipeDisplay.innerHTML +=
                learnedRecipesWithIndex
                .map(([item, originalIndex]) =>
                    `Recipe: <span style="color: ${item.output.color};">
                    ${item.output.name}</span> ` +
                    `<em>(${item.materials.join(", ")})</em>`
                )
                .join("<br>");
            
            document.getElementById("crafting-content").style.display = craftDisplay.innerHTML === "" ? "none" : "block";
        }

        // try to turn on recipes are turned on if some exist and (button is turned on or if crafting is hidden)
        function showRecipes(){
            let showing = document.getElementById("recipe-content").style.display === "block";
            if (!showing){
                document.getElementById("recipe-content").style.display = "block";
                document.getElementById("recipeToggle").innerHTML = "Hide Recipes";
            } else {
                document.getElementById("recipe-content").style.display = "none";
                document.getElementById("recipeToggle").innerHTML = "Show Recipes";
            }
        }

        function showCrafting(){
            let showing = document.getElementById("craftDisplay").style.display === "block";
            if (!showing){
                document.getElementById("craftDisplay").style.display = "block";
                document.getElementById("craftingToggle").innerHTML = "Hide Crafting";
            } else {
                document.getElementById("craftDisplay").style.display = "none";
                document.getElementById("craftingToggle").innerHTML = "Show Crafting";
                document.getElementById("recipe-content").style.display = "none";
                document.getElementById("recipeToggle").innerHTML = "Show Recipes";
            }
        }

        function updateEquipSelect() {
            const select = document.getElementById("equipSelect");
            const previousValue = select.value;

            select.innerHTML = "";

            const equippables = inventory.items.filter(item => item.equippable).sort((a, b) => a.equippable.localeCompare(b.equippable));
            for (const item of equippables) {
                let option = document.createElement("option");
                option.value = item.name;
                option.text = `${item.equippable} - ${item.name} (${item.quantity})`;
                select.add(option);
            }

            if (previousValue && Array.from(select.options).some(opt => opt.value === previousValue)) {
                select.value = previousValue;
            } else if (select.options.length > 0 && !select.value) {
                select.selectedIndex = 0;
            }
        }

        function updateWorldSelect(){
            const select = document.getElementById("worldSelect");
            const previousValue = select.value;

            select.innerHTML = "";

            let worlds = [];
            // // TEMP CREATIVE MODE
            // for (const key in WORLD_DEFS){
            //     worlds.push(WORLD_DEFS[key])
            // }

            worlds.push(WORLD_DEFS["Rivertown Shire"]);
            if (level >= 3) worlds.push(WORLD_DEFS["Greater Rivertown"]);
            if (level >= 5 && inventory.knownItems.has("Walking Boots")) worlds.push(WORLD_DEFS["The Longroad"]);
            if (level >= 6 && inventory.knownItems.has("Wading Boots")) worlds.push(WORLD_DEFS["Black Swamp"]);
            if (level >= 9 && inventory.knownItems.has("Enchanted Reaper Cloak")) worlds.push(WORLD_DEFS["Spirit Realm Threshold"]);
            if (level >= 11 && reps.get("The Longroad Authority").level() >= 2) worlds.push(WORLD_DEFS["Faraway Kingdom"]);
            if (level >= 12 && inventory.knownItems.has("Shadow Signet") && inventory.knownItems.has("Farside Trophy")) worlds.push(WORLD_DEFS["Mountainland Foothills"]);
            if (level >= 14 && reps.get("Mountainland Kingdom").level() >= 2) worlds.push(WORLD_DEFS["Mountainland Underworld"]);
            if (level >= 16 && reps.get("Mountainland Kingdom").level() >= 3 && reps.get("Faraway Kingdom").level() >= 3) worlds.push(WORLD_DEFS["Mountainland City"]);
            if (level >= 19 && inventory.knownItems.has("Farside Viewing Lens")) worlds.push(WORLD_DEFS["Farside Hideout"]);

            for (const world of worlds) {
                let option = document.createElement("option");
                option.value = world.name;
                option.text = "Act " + toRoman(world.act) + "- " + world.name;
                select.add(option);
            }

            if (previousValue && Array.from(select.options).some(opt => opt.value === previousValue)) {
                select.value = previousValue;
            } else if (select.options.length > 0 && !select.value) {
                select.selectedIndex = 0;
            }
        
        }

        function updateFocus(){
            const select = document.getElementById("enemySelect");
            const previousValue = select.value;

            select.innerHTML = "";

            let enemyList = new Set([]);
            enemyList.add("None");
            let worldEnemies = WORLD_DEFS[worldSelect.value].enemyList;
            for (const enemyCandidate of worldEnemies){
                enemyList.add(enemyCandidate[0]);
            }

            for (const enemyName of enemyList) {
                let option = document.createElement("option");
                option.value = enemyName;
                option.text = enemyName;
                select.add(option);
            }

            if (previousValue && Array.from(select.options).some(opt => opt.value === previousValue)) {
                select.value = previousValue;
            } else if (select.options.length > 0 && !select.value) {
                select.selectedIndex = 0;
            }
        }

        function updateUnequipSelect() {
            const select = document.getElementById("unequipSelect");
            const previousValue = select.value;

            select.innerHTML = "";

            for (const item of equipped) {
                let option = document.createElement("option");
                option.value = item.name;
                option.text = item.equippable + " - " + item.name;
                select.add(option);
            }

            if (previousValue && Array.from(select.options).some(opt => opt.value === previousValue)) {
                select.value = previousValue;
            } else if (select.options.length > 0 && !select.value) {
                select.selectedIndex = 0;
            }
        }

        function addToLastHits(damage){
            lastHits.push(damage);
            if (lastHits.length > 1000){
                lastHits.shift();
            }
        }

        function updateEntityDisplay(lastHit = -1) {
            const icon = document.getElementById("entityIcon");
            const nameDisplay = document.getElementById("entityNameDisplay");
            const healthDisplay = document.getElementById("entityHealthDisplay");
            nameDisplay.innerHTML = "";
            healthDisplay.innerHTML = "";

            let entityName = document.createElement("strong");
            entityName.id = "entityName";
            entityName.textContent = activeEntity.name;
            entityName.onmouseover = () => {
                if (activeEntity.desc != ""){
                    document.getElementById("tooltip").style.display="block";
                    document.getElementById("tooltip").innerHTML = activeEntity.desc;
                }
            }
            entityName.onmouseout = () => document.getElementById("tooltip").style.display = "none";
            nameDisplay.appendChild(entityName);

            let entityLevel = document.createElement("strong");
            entityLevel.id = "entityLevel";
            entityLevel.textContent = " (" + activeEntity.mobLevel + ")";
            nameDisplay.appendChild(entityLevel);


            let entityHP = document.createElement("strong");
            entityHP.id = "entityHP";
            entityHP.textContent = activeEntity.HP;
            healthDisplay.appendChild(entityHP);

            if (lastHit > -1) {
                healthDisplay.appendChild(document.createTextNode(" "));

                let entityDamage = document.createElement("span");
                entityDamage.id = "entityLastHit";

                if (activeEntity.armor > 0 && lastHit - activeEntity.armor > 0) {
                    entityDamage.innerHTML = `(-${lastHit - activeEntity.armor}) <em>(${lastHit} dmg, ${activeEntity.armor} armor)</em>`;
                } else if (activeEntity.armor > 0){
                    entityDamage.innerHTML = `(-0) <em>(${lastHit} dmg, ${activeEntity.armor} armor)</em>`;
                } else {
                    entityDamage.innerHTML = `(-${lastHit})`;
                }

                healthDisplay.appendChild(entityDamage);
                addToLastHits(lastHit);
            }
            document.getElementById("entityLevel").style.color = "";
            if (level > activeEntity.mobLevel) document.getElementById("entityLevel").style.color = "#c5c5c5ff";
            document.getElementById("knownWorlds").innerHTML = `${knownWorlds.size} / ${Object.keys(WORLD_DEFS).length}`;
            // console.log(knownWorlds);

            icon.src = 'icons/entities/' + activeEntity.icon + '.png';
            icon.width = 64;
            icon.height = 64;
            icon.style.verticalAlign = 'middle';
            if (activeEntity.hue){
                icon.style.filter = 'invert(0) sepia(0.5) saturate(1000%) hue-rotate(' + activeEntity.hue + ')';
            } else {
                icon.style.filter = '';
            }
            // console.log('icons/' + activeEntity.icon + '.png -> ' + img.src);

            updateDPSDisplay();
            updateDropTableDisplay();
        }

        function updateDropTableDisplay() {
            const dropTable = activeEntity.lootTable;
            if (!dropTable){
                return;
            }

            const sortedItems = dropTable.items.slice().sort((a, b) => {
                const aI = dropTable.items.indexOf(a);
                const bI = dropTable.items.indexOf(b);
                return dropTable.weights[bI] - dropTable.weights[aI];
            });

            const intersection = sortedItems.filter(item => inventory.knownItems.has(item.name));

            const dropTableDisplay = document.getElementById("dropTableDisplay");
            dropTableDisplay.innerHTML = "";

            intersection.forEach(item => {
                const chance = truncateDecimal(100 * dropTable.getChance(item), 2);

                const wrapper = document.createElement("span");

                const chanceSpan = document.createElement("span");
                chanceSpan.textContent = `(${chance}%) `;
                chanceSpan.style.color = "";
                wrapper.appendChild(chanceSpan);

                const temp = { items: [item], list: Inventory.prototype.list };
                const itemFragment = temp.list.call({ items: [item] });
                wrapper.onmouseout = () => document.getElementById("tooltip").style.display = "none";
                wrapper.appendChild(itemFragment);

                dropTableDisplay.appendChild(wrapper);
                dropTableDisplay.appendChild(document.createElement("br"));
            });

            // Update entity name color
            const entityNameEl = document.getElementById("entityName");
            entityNameEl.style.color = (intersection.length === sortedItems.length) ? GOLD : "";
        }

        function updateDPSDisplay(){
            if (lastHits.length == 0){
                document.getElementById("dpsDisplay").innerHTML = "0 average dmg"
                return;
            }
            
            let cumDamage = 0;
            
            for (let i = 0; i < lastHits.length; i++){
                cumDamage += lastHits[i];
            }
            
            document.getElementById("dpsDisplay").innerHTML = Math.floor(cumDamage / lastHits.length) + " average dmg";
        }

        function equip(itemName){
            // console.log("trying to equip " + itemName);
            if (!inventory.items){
                return;
            }
            let item = inventory.items.find(i => i.name == itemName);
            if (!item){
                return;
            }
            if (!item.equippable){
                return;
            }

            for (let i of equipped){
                if (i.equippable == item.equippable){
                    inventory.addItem(Item.createItem(i.name, 1));
                    equipped = equipped.filter(e => e !== i);
                }
            }

            item.quantity -= 1;
            if(item.quantity == 0) inventory.items = inventory.items.filter(i => i.name !== itemName);

            equipped.push(Item.createItem(item.name, 1));
            // console.log("equipped " + itemName);
            updateInventory();
            updateEquipped();
            updateWorldSelect();
            computeLoadoutStats();
        }

        function itemEquipped(name){
            for (let i of equipped){
                if (i.name == name){
                    return true;
                }
            }
            return false;
        }

        function unequip(itemName){
            let item = equipped.find(i => i.name == itemName);
            if (!item){
                return;
            }
            equipped = equipped.filter(i => i != item);
            inventory.addItem(Item.createItem(item.name, 1));
            updateInventory();

        function computeLoadoutStats() {
            let state = {
                dmg: [new DamagePair("physical",1)],
                dmgMult: 1.0,
                moreMult: 1.0,
                missChance: 0.05,
                missMult: 0,
                arcaneCount: 0,
                arcaneSetBonus: 0,
                starSetBonus: 0,
                necroSetBonus: 0,
                setBase: -1,
                dropBonus: 1.0,
            };

            for (let i of equipped) {
                if (ItemStaticEffects[i.name]) {
                    ItemStaticEffects[i.name](state);
                    continue;
                }
            }
            // console.log("state.dmg before merge:", state.dmg);
            // state.dmg = DamagePair.mergeDamage(
            //     state.dmg,
            //     [new DamagePair("astral",state.starSetBonus * state.starSetBonus * 25)]
            // );
            // console.log("state.dmg after merge:", state.dmg);
            state.dmgMult += state.arcaneCount * state.arcaneSetBonus * 0.03;
            state.missChance -= state.necroSetBonus * state.necroSetBonus * .02;
            dropCount = Math.floor(state.dropBonus);
            dropBonus = state.dropBonus % 1;

            //if (state.setBase !== -1) state.dmg = state.setBase;

            precomputedDamage = {
                baseDmg: state.dmg,
                dmgMult: state.dmgMult,
                moreMult: state.moreMult,
                missChance: state.missChance,
                missMult: state.missMult,
                arcaneCount: state.arcaneCount,
                arcaneSetBonus: state.arcaneSetBonus,
                starSetBonus: state.starSetBonus,
                necroSetBonus: state.necroSetBonus,
                setBase: state.setBase,
            };

            updateStatsDisplay();
        }

        function updateStatsDisplay(){
            statsDisplay = document.getElementById("statsDisplay");
            statsDisplay.innerHTML = "";
            statsDisplay.innerHTML += formatDamage(precomputedDamage.baseDmg) + "\n";
            if ((precomputedDamage.dmgMult) > 1) statsDisplay.innerHTML += Math.floor(precomputedDamage.dmgMult * 100) + "% dmg\n";
            if ((precomputedDamage.moreMult) > 1) statsDisplay.innerHTML += truncateDecimal(precomputedDamage.moreMult,3) + "x dmg\n";
            statsDisplay.innerHTML += Math.floor(100 - precomputedDamage.missChance * 100) + "% chance to hit\n";
            if ((dropCount + dropBonus) > 1) statsDisplay.innerHTML += truncateDecimal(100 * (dropCount + dropBonus),4) + "% drops\n";
        }

                    repDiv.appendChild(repElement);
                }
            })
            display.appendChild(repDiv);
        }

        function formatDamage(dmg) {
            return dmg.map(d => `${d.magnitude} ${d.type}`).join("\n");

        function saveGame() {
            const saveData = {
                items: inventory.serialize(),
                knownItems: Array.from(inventory.knownItems),
                knownWorlds: Array.from(knownWorlds),
                equipped: equipped,
                level: level,
                xp: experience,
                volume: volume,

                reps: Array.from(reps.entries()).map(([name, rep]) => [
                    name,
                    rep.serialize()
                ])
            };
            localStorage.setItem("clickerGameInfo", JSON.stringify(saveData));
        }

        function loadGame() {
            const savedDataString = localStorage.getItem("clickerGameInfo");
            if (savedDataString) {
                const savedData = JSON.parse(savedDataString);
                localStorage.setItem("clickerGameInfo", savedDataString);
                equipped = savedData.equipped || [];
                autoMode = false;

                inventory = new Inventory();
                inventory.load(savedData.items || []);

                level = savedData.level || 0;
                experience = savedData.xp || 0;
                gainExperience();

                inventory.knownItems.clear();
                knownWorlds.clear();
                if (savedData.knownItems) {
                    for (const item of savedData.knownItems) {
                        inventory.knownItems.add(item);
                    }
                }
                if (savedData.knownWorlds) {
                    for (const world of savedData.knownWorlds) {
                        knownWorlds.add(world);
                    }
                }
                volume = savedData.volume || 50;
                document.getElementById("volumeSlider").value = volume;

                reps.clear();
                savedData.reps.forEach(([name, data]) => {
                    reps.set(
                        name,
                        new Reputation(
                            data.name,
                            data.difficulty,
                            data.rep
                        )
                    );
                });
            } else {
                inventory = new Inventory();
            }
            updateInventory();
            updateReputationGuide();
            updateEquipped();
            updateWorldSelect();
            computeLoadoutStats();
        }

    <script>
        let textTimer;
        function hit(){
            let hit = attackDamage();
            let loot;
            activeEntity.damage(hit);
            attackCount++;
            enemyAttacks++;
            if (activeEntity.destroyed){
                if (loot = activeEntity.getLoot(dropCount, dropBonus)){
                    document.getElementById("lootDisplay").innerHTML = "Got: ";
                    for (let item of loot){
                        inventory.addItem(item);
                        document.getElementById("lootDisplay").innerHTML +=  item.quantity + "x" + `<span style="color: ${item.color}"> ${item.name} </span>`;
                    }
                    if (textTimer) clearTimeout(textTimer);
                    textTimer = setTimeout(() => {
                        document.getElementById("lootDisplay").innerHTML = "";
                        textTimer = null;
                    }, 6000);
                }
                gainExperience(activeEntity);
                gainReputation(activeEntity);
                activeEntity = randomEnemy(worldSelect.value);
                enemyAttacks = 0;
                kills++;
                updateInventory();
                updateReputationGuide();
            } 

            updateEntityDisplay(hit);
        }
    </script>

    <script>
        function attackDamage() {
            let state = {
                dmg: precomputedDamage.baseDmg,
                dmgMult: precomputedDamage.dmgMult,
                moreMult: precomputedDamage.moreMult,
                missChance: precomputedDamage.missChance,
                missMult: precomputedDamage.missMult,
                armorBreak: 0,
                armorBreakMod: 1.00,
                attackCount,
                enemyAttacks,
                inventory,
                activeEntity
            };

            if (!Array.isArray(state.dmg)) {
                throw new Error("BROKEN dmg STATE: " + state.dmg);
            }

            // console.log("state.dmg:",state.dmg)
            
            for (const i of equipped) {
                const effect = ItemEffects[i.name];
                if (effect) effect(state);
            }

            
            state.armorBreakMod *= 10;
            let cumDamage = 0
            // console.log("state.dmg:",state.dmg)
            for (let damage_pair of state.dmg){
                // console.log(damage_pair);
                delta = Math.floor(
                    Math.max(0, damage_pair.magnitude) *
                    Math.max(0.0, state.dmgMult) *
                    Math.max(0.0, state.moreMult) +
                    Math.min(Math.max(0.0, state.armorBreak) * Math.max(0.0, state.armorBreakMod), state.activeEntity.armor)
                );
                // console.log("delta:",delta);
                cumDamage += delta;
            }
            if (!Array.isArray(state.dmg)) {
                throw new Error("BROKEN dmg STATE: " + state.dmg);
            }
            if (Math.random() < state.missChance) cumDamage *= state.missMult;
            // console.log("attackDamage:",cumDamage)
           return cumDamage
        }
        
    </script>

    <script>
        function randomEnemy(worldName){
            let world = WORLD_DEFS[worldName];
            const focusedEnemyName = document.getElementById("enemySelect").value;
            document.body.style.backgroundColor = world.worldColor;
            let enemyList = [];
            for (let i = 0; i < world.enemyList.length; i++){
                enemyList.push(world.enemyList[i]);
            }
            if (focusedEnemyName !== "None"){
                // find level range
                let levelRange = [];
                world.enemyList.forEach(enemyPair => {
                    if (enemyPair[0] === focusedEnemyName){
                        levelRange.push(enemyPair[1]);
                    }
                });
                // console.log(focusedEnemyName + " is available at levels " + levelRange);
                enemyList.push([focusedEnemyName, levelRange[Math.floor(Math.random() * levelRange.length)]]);
            }
            // if (itemEquipped("Greedy Goldgrubber Grips")){
            //     enemyList.push("Treasure Goblin");
            // }
            let pair = enemyList[Math.floor(Math.random() * enemyList.length)];
            let enemy = spawnEnemy(pair[0], pair[1]);
            //console.log("of " + enemyList + " chose" + enemy.name);
            document.getElementById("xpText").style.color = "";
            if (enemy.mobLevel < level){
                document.getElementById("xpText").style.color = "#c5c5c5ff";
            }
            return enemy;
        }

        function newStart(){
            let firstWorld = WORLD_DEFS["Rivertown Shire"];
            updateFocus();
            knownWorlds.add(firstWorld.name);
            activeEntity = randomEnemy(firstWorld.name);
            resetReps();
            updateEntityDisplay(-1);
            updateReputationGuide();
            document.getElementById("recipe-content").style.display = "block";
            document.getElementById("craftDisplay").style.display = "block";
        }
    </script>
